{% extends "base.html" %}
{% block content %}
<h2>Products</h2>
<form method="POST" class="row g-3 mb-4">
    <div class="col-auto">
        <input type="text" name="name" placeholder="Product name" class="form-control" required>
    </div>
    <div class="col-auto">
        <input type="number" step="0.01" name="price" placeholder="Price" class="form-control" required>
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-primary">Add Product</button>
    </div>
</form>

<table class="table">
    <thead>
        <tr><th>ID</th><th>Name</th><th>Price</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.name }}</td>
            <td>₹{{ "%.2f"|format(p.price) }}</td>
            <td>
                <form action="{{ url_for('update_product', id=p.id) }}" method="POST" style="display:inline;">
                    <input type="text" name="name" value="{{ p.name }}" required>
                    <input type="number" step="0.01" name="price" value="{{ p.price }}" required>
                    <button type="submit" class="btn btn-sm btn-warning">Update</button>
                </form>
                <a href="{{ url_for('delete_product', id=p.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
